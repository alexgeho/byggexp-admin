name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-byggexp-admin
  cancel-in-progress: false

env:
  APP_NAME: byggexp-admin
  APP_PORT: '5174'
  APP_BASE: /opt/byggexp-admin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Pack standalone release
        run: |
          set -euo pipefail
          if [ -d public ]; then
            cp -r public .next/standalone/public
          else
            mkdir -p .next/standalone/public
          fi
          cp -r .next/static .next/standalone/.next/static
          cp ecosystem.config.cjs .next/standalone/ecosystem.config.cjs
          tar -czf /tmp/release.tar.gz -C .next/standalone .
          mv /tmp/release.tar.gz ./release.tar.gz
          ls -lh release.tar.gz

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: release.tar.gz
          target: /tmp/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            RELEASE=$(date -u +%Y%m%d-%H%M%S)
            BASE=${{ env.APP_BASE }}
            DIR=$BASE/releases/$RELEASE
            APP_NAME=${{ env.APP_NAME }}
            APP_PORT=${{ env.APP_PORT }}

            echo "==> New release: $DIR"
            DEPLOY_USER="$(id -un)"
            DEPLOY_GROUP="$(id -gn)"
            mkdir -p "$DIR"
            tar -xzf /tmp/release.tar.gz -C "$DIR"
            rm -f /tmp/release.tar.gz
            chown -R "$DEPLOY_USER:$DEPLOY_GROUP" "$DIR"

            ln -sfn "$DIR" "$BASE/current"
            echo "==> Linked $BASE/current -> $DIR"

            cd "$BASE/current"
            echo "==> (Re)starting PM2"
            pm2 delete "$APP_NAME" >/dev/null 2>&1 || true
            pm2 start ecosystem.config.cjs
            pm2 save

            echo "==> Health check (Next.js on :$APP_PORT)"
            sleep 3
            for i in 1 2 3 4 5 6; do
              if curl -fsS -m 5 "http://127.0.0.1:${APP_PORT}/" -o /dev/null; then
                echo "OK on attempt $i"
                break
              fi
              if [ "$i" -eq 6 ]; then
                echo "Health check failed!" >&2
                pm2 logs "$APP_NAME" --lines 50 --nostream
                exit 1
              fi
              sleep 3
            done

            echo "==> Cleaning old releases (keep 5)"
            set +e
            for OLD in $(ls -1dt "$BASE"/releases/*/ 2>/dev/null | tail -n +6); do
              OLD="${OLD%/}"
              echo "Removing old release: $OLD"
              if rm -rf "$OLD"; then
                continue
              fi
              echo "Permission denied on $OLD, fixing ownership..."
              chown -R "$DEPLOY_USER:$DEPLOY_GROUP" "$OLD" 2>/dev/null || \
                sudo chown -R "$DEPLOY_USER:$DEPLOY_GROUP" "$OLD" 2>/dev/null || true
              if rm -rf "$OLD"; then
                continue
              fi
              sudo rm -rf "$OLD" 2>/dev/null || \
                echo "Warning: could not remove $OLD — prune manually on VPS" >&2
            done
            set -e

            echo "==> Deploy successful: $RELEASE"
